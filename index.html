<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Edge Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    h1, h2, p {
      margin: 0 0 10px 0;
    }

    .selector-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 15px;
    }

    .stat {
      background: #2a2a2a;
      padding: 12px;
      border-radius: 10px;
    }

    canvas {
      background: #fff;
      border-radius: 10px;
      padding: 10px;
    }

    .small {
      color: #bbb;
      font-size: 14px;
    }

    .good { color: #4ade80; }
    .small-edge { color: #facc15; }
    .bad { color: #f87171; }

    .message {
      background: #2a2a2a;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>NBA Edge Tracker</h1>
      <p class="small">Updates every 30 seconds · shows last 15 minutes</p>
    </div>

    <div class="card">
      <div class="selector-row">
        <label for="gameSelect">Select NBA game</label>
        <select id="gameSelect"></select>
        <div id="statusMessage" class="message">Loading...</div>
      </div>
    </div>

    <div class="card">
      <h2 id="matchup">Waiting for game selection</h2>
      <p id="pick">Pick: -</p>

      <div class="stats">
        <div class="stat">
          <strong>Current Edge</strong>
          <p id="edgeValue">-</p>
        </div>
        <div class="stat">
          <strong>Verdict</strong>
          <p id="verdict">-</p>
        </div>
        <div class="stat">
          <strong>Sportsbook Odds</strong>
          <p id="odds">-</p>
        </div>
        <div class="stat">
          <strong>Implied Probability</strong>
          <p id="implied">-</p>
        </div>
        <div class="stat">
          <strong>True Probability</strong>
          <p id="trueProb">-</p>
        </div>
        <div class="stat">
          <strong>Last Update</strong>
          <p id="updatedAt">-</p>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Edge — Last 15 Minutes</h2>
      <canvas id="edgeChart"></canvas>
    </div>
  </div>

  <script>
    const gameSelect = document.getElementById("gameSelect");
    const statusMessage = document.getElementById("statusMessage");
    let selectedGameId = null;

    const ctx = document.getElementById("edgeChart").getContext("2d");

    const edgeChart = new Chart(ctx, {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          label: "Edge",
          data: [],
          borderColor: "blue",
          backgroundColor: "rgba(0, 0, 255, 0.1)",
          tension: 0.2
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            ticks: {
              callback: function(value) {
                return (value * 100).toFixed(1) + "%";
              }
            }
          }
        }
      }
    });

    function formatPercent(value) {
      return (value * 100).toFixed(2) + "%";
    }

    function setVerdictClass(verdict) {
      const verdictEl = document.getElementById("verdict");
      verdictEl.className = "";

      if (verdict === "Good value") {
        verdictEl.classList.add("good");
      } else if (verdict === "Small edge") {
        verdictEl.classList.add("small-edge");
      } else {
        verdictEl.classList.add("bad");
      }
    }

    function clearDashboard(message) {
      document.getElementById("matchup").textContent = message;
      document.getElementById("pick").textContent = "Pick: -";
      document.getElementById("edgeValue").textContent = "-";
      document.getElementById("verdict").textContent = "-";
      document.getElementById("odds").textContent = "-";
      document.getElementById("implied").textContent = "-";
      document.getElementById("trueProb").textContent = "-";
      document.getElementById("updatedAt").textContent = "-";

      edgeChart.data.labels = [];
      edgeChart.data.datasets[0].data = [];
      edgeChart.update();
    }

    async function loadGames() {
      const res = await fetch("/games");
      const payload = await res.json();

      gameSelect.innerHTML = "";

      if (!payload.games || payload.games.length === 0) {
        const option = document.createElement("option");
        option.textContent = "No games available";
        option.value = "";
        gameSelect.appendChild(option);
        statusMessage.textContent = "No games available right now.";
        clearDashboard("No games available");
        selectedGameId = null;
        return;
      }

      payload.games.forEach(game => {
        const option = document.createElement("option");
        option.value = game.id;
        option.textContent = game.label;
        gameSelect.appendChild(option);
      });

      if (!selectedGameId || !payload.games.some(g => g.id === selectedGameId)) {
        selectedGameId = payload.games[0].id;
      }

      gameSelect.value = selectedGameId;

      const modeText = payload.mode === "mock" ? "Mock mode ready for tomorrow." : "Live mode.";
      statusMessage.textContent = `${modeText} ${payload.games.length} game(s) loaded.`;
    }

    async function loadSelectedGame() {
      if (!selectedGameId) return;

      const res = await fetch(`/odds?gameId=${encodeURIComponent(selectedGameId)}`);
      const data = await res.json();

      if (data.error) {
        statusMessage.textContent = data.error;
        clearDashboard(data.error);
        return;
      }

      document.getElementById("matchup").textContent =
        `${data.awayTeam} @ ${data.homeTeam}`;
      document.getElementById("pick").textContent = `Pick: ${data.pick}`;
      document.getElementById("edgeValue").textContent = formatPercent(data.edge);
      document.getElementById("verdict").textContent = data.verdict;
      document.getElementById("odds").textContent = data.sportsbookOddsDecimal;
      document.getElementById("implied").textContent = formatPercent(data.impliedProbability);
      document.getElementById("trueProb").textContent = formatPercent(data.trueProbability);
      document.getElementById("updatedAt").textContent = new Date(data.timestamp).toLocaleTimeString();

      setVerdictClass(data.verdict);

      edgeChart.data.labels = data.history.map(point =>
        new Date(point.timestamp).toLocaleTimeString()
      );
      edgeChart.data.datasets[0].data = data.history.map(point => point.edge);
      edgeChart.update();
    }

    gameSelect.addEventListener("change", async (event) => {
      selectedGameId = event.target.value;
      await loadSelectedGame();
    });

    async function refreshAll() {
      await loadGames();
      await loadSelectedGame();
    }

    refreshAll();
    setInterval(refreshAll, 30000);
  </script>
</body>
</html>
